<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Free Trial — Plumlo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0a1a;
      font-family: 'Segoe UI', sans-serif;
      color: #e9d5ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: #1a1028;
      border: 1px solid #3b1f6a;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .logo {
      font-size: 2rem;
      font-weight: 800;
      color: #c084fc;
      letter-spacing: -1px;
      margin-bottom: 24px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 12px; }
    p { color: #a78bca; font-size: 0.95rem; line-height: 1.6; margin-bottom: 32px; }
    input {
      width: 100%;
      padding: 16px;
      background: #0f0a1a;
      border: 1px solid #3b1f6a;
      border-radius: 10px;
      color: #e9d5ff;
      font-size: 1rem;
      margin-bottom: 16px;
      text-align: center;
    }
    input::placeholder { color: #5b4070; }
    button {
      width: 100%;
      padding: 16px;
      background: #7c3aed;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .message { margin-top: 20px; font-size: 0.9rem; min-height: 24px; }
    .success { color: #86efac; }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">plumlo</div>
    <h1>Try one free interview.</h1>
    <p>Enter your email and we'll send you an access code instantly. No credit card required.</p>
    <input type="email" id="email" placeholder="your@email.com" />
    <button id="btn" onclick="submit()">Get My Free Code →</button>
    <div class="message" id="msg"></div>
  </div>

  <script>
    async function submit() {
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('btn');
      const msg = document.getElementById('msg');

      if (!email) {
        msg.textContent = 'Please enter your email.';
        msg.className = 'message error';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending...';
      msg.textContent = '';

      try {
        const res = await fetch('/api/free-trial', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (res.ok) {
          msg.textContent = 'Code sent! Check your inbox.';
          msg.className = 'message success';
          btn.textContent = 'Sent ✓';
        } else {
          msg.textContent = data.error || 'Something went wrong.';
          msg.className = 'message error';
          btn.disabled = false;
          btn.textContent = 'Get My Free Code →';
        }
      } catch {
        msg.textContent = 'Something went wrong. Try again.';
        msg.className = 'message error';
        btn.disabled = false;
        btn.textContent = 'Get My Free Code →';
      }
    }
  </script>
</body>
</html>
